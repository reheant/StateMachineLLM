services:
  backend:
    build:
      context: ..
      dockerfile: StateMachineLLM/Dockerfile
    container_name: tracer-backend
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEBUG=${DEBUG:-False}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    volumes:
      - ./backend/resources/event_driven_log:/app/backend/resources/event_driven_log
      - ./backend/resources/single_prompt_log:/app/backend/resources/single_prompt_log
      - ./backend/resources/single_prompt_outputs:/app/backend/resources/single_prompt_outputs
      - ./backend/resources/event_driven_diagrams:/app/backend/resources/event_driven_diagrams
      - ./backend/resources/single_prompt_diagrams:/app/backend/resources/single_prompt_diagrams
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ..
      dockerfile: StateMachineLLM/frontend/Dockerfile
    container_name: tracer-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
